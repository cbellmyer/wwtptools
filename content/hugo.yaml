baseURL: "https://wwtptools.com/"
title: "WWTP Tools"
copyright: "CC BY-NC 4.0"
theme: [hypercat-theme]

enableInlineShortcodes: true
buildDrafts: false
buildFuture: true
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts"]

minify:
  disableXML: true

pagination:
  disableAliases: false
  pagerSize: 5

disableKinds:
  - taxonomy
  - term

menu:
  main:
    - name: Calculators
      url: /calculators/
      weight: 5
    - name: Reference
      url: /reference/
      weight: 10
    - name: Guides
      url: /guides/
      weight: 15
    - name: Matrix
      url: /matrix/
      weight: 16
    - name: About
      url: /about/
      weight: 18
    - name: GitHub
      url: "https://github.com/cbellmyer/wwtptools"
      weight: 20

outputs:
  home:
    - HTML
    - JSON
  page:
    - HTML
  section:
    - HTML

params:
  env: production
  defaultTheme: dark
  disableThemeToggle: true
  description: "Free process calculators and reference tools for wastewater treatment plant operators."
  author: "Chris Bellmyer"

  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  ShowPageNums: false
  ShowToc: false

  profileMode:
    enabled: false

  socialIcons:
    - name: github
      title: View on GitHub
      url: "https://github.com/cbellmyer/wwtptools"

  assets:
    disableHLJS: true

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true
    relative: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
