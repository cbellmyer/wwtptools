ci:
  collect:
    staticDistDir: content/public
    url:
      - http://localhost/
      - http://localhost/calculators/
      - http://localhost/reference/
      - http://localhost/guides/
      - http://localhost/matrix/
      - http://localhost/about/
    numberOfRuns: 1
  assert:
    preset: lighthouse:no-pwa
    assertions:
      categories:performance:
        - warn
        - minScore: 0.8
      categories:accessibility:
        - error
        - minScore: 0.9
      categories:best-practices:
        - warn
        - minScore: 0.85
      categories:seo:
        - warn
        - minScore: 0.9
