name: Lighthouse

on:
  pull_request:
    paths:
      - "content/**"
      - "build.sh"
      - ".hugo-version"
      - ".hugo-archive-checksum"
      - ".lighthouserc.json"
      - ".github/workflows/lighthouse.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: content/resources/_gen
          key: >-
            ${{ runner.os }}-hugo-resources-${{
            hashFiles('content/**', 'content/assets/**',
            'content/hugo.yaml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      - name: Build Hugo site
        run: |
          cd content
          npm install
          npm run build
          if [ ! -f public/index.html ]; then
            echo "Error: Hugo build failed - public/index.html not found"
            exit 1
          fi

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.yml
          uploadArtifacts: true

      - name: Comment scores on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          RESULTS_PATH: ${{ steps.lighthouse.outputs.resultsPath }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const manifestPath = path.join(
              process.env.RESULTS_PATH, "manifest.json"
            );
            if (!fs.existsSync(manifestPath)) {
              core.warning(`No Lighthouse manifest at ${manifestPath}`);
              return;
            }
            const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
            const fmt = (score) => {
              const value = Math.round(score * 100);
              const icon = value >= 90 ? "🟢" : value >= 50 ? "🟡" : "🔴";
              return `${icon} ${value}`;
            };
            const rows = manifest
              .filter((run) => run.isRepresentativeRun)
              .map((run) => {
                const path = new URL(run.url).pathname
                  .replace(/index\.html$/, "");
                const s = run.summary;
                return `| \`${path}\` | ${fmt(s.performance)} | ` +
                  `${fmt(s.accessibility)} | ${fmt(s["best-practices"])} | ` +
                  `${fmt(s.seo)} |`;
              });
            const marker = "<!-- lighthouse-scores -->";
            const body = [
              marker,
              "### Lighthouse scores (mobile)",
              "",
              "| Page | Performance | Accessibility | Best Practices | SEO |",
              "| --- | --- | --- | --- | --- |",
              ...rows,
              "",
              "_Advisory only — scores do not block merge. " +
                "Full reports are attached as workflow artifacts._",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === "Bot" && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
