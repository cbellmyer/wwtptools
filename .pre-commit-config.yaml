# Pre-commit hooks for Hugo site
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

exclude: ^(content/resources/|content/public/|content/themes/)

default_install_hook_types: [pre-commit, pre-push]

repos:
  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        name: Block push to main
        stages: [pre-push]
        args: ['--branch', 'main']
      - id: trailing-whitespace
        exclude: ^\.github/workflows/
      - id: end-of-file-fixer
        exclude: ^\.github/workflows/
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: ^\.github/workflows/

  # YAML linting (covers syntax + style; replaces check-yaml)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['--config-file', '.yamllint.yaml']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']

  # Formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format with Prettier
        types_or: [markdown, json]
        exclude: ^(content/resources/|content/public/|content/themes/|\.github/|content/layouts/)

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell

  # GitHub Actions validation
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        args: ['-ignore', 'output "manifest" is not defined']

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        types: [shell]
        args: ['--severity=warning']

  # CSS linting
  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v17.3.0
    hooks:
      - id: stylelint
        files: \.css$
        args: ['--fix']
        additional_dependencies:
          - stylelint@17.3.0
          - stylelint-config-standard@40.0.0

  # Local project hooks
  - repo: local
    hooks:
      - id: update-hugo-checksum
        name: Update Hugo archive checksum
        entry: ./scripts/update-hugo-checksum.sh
        language: script
        pass_filenames: false
        files: ^\.hugo-version$
      - id: validate-cdn-usage
        name: Validate CDN usage
        entry: ./scripts/validate-cdn-usage.sh
        language: script
        pass_filenames: false
        files: ^content/.*\.(html|htm)$
      - id: sri-integrity-check
        name: Validate and add SRI hashes for CDN assets
        entry: ./scripts/validate-and-update-sri.sh
        language: script
        pass_filenames: true
        files: ^content/.*\.html$
        # NOTE: This hook automatically updates SRI hashes on commit. This is intentional.
        # SRI hashes must be kept up-to-date for security. Do not remove this automation.
      - id: validate-config
        name: Validate project configuration
        entry: bash scripts/validate-config.sh
        language: system
        pass_filenames: false
        files: ^(content/hugo\.yaml|wrangler\.jsonc)$
      - id: hugo-build
        name: Hugo build check
        entry: bash -c 'cd content && npm run build'
        language: system
        pass_filenames: false
        files: ^(content/(content|layouts|assets|themes|hugo\.yaml))
        stages: [pre-push]

ci:
  autoupdate_schedule: monthly
